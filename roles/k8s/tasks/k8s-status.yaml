- name: livez check
  shell: |
    curl -k https://localhost:6443/livez 
  failed_when: false
  register: livez

- name: k8s version
  shell: |
    curl -k -s https://localhost:6443/version | jq -r .gitVersion
  failed_when: false
  register: current_k8s_version

- name: set k8s_upgrade to false and current_k8s_version
  set_fact:
    k8s_upgrade: false
    current_k8s_version: "{{ current_k8s_version.stdout }}"

- name: set k8s_upgrade to true if version is lower than new version
  set_fact:
    k8s_upgrade: true
  when: not current_k8s_version|length == 0 and current_k8s_version is version(k8s_version, '<')

- name: check if k8s is installed
  stat:
    path: "{{ k8s_check_file }}"
  register: etc_k8s

- name: re-set etc_k8s and kubernetes healthy flag
  set_fact:
    k8s_installed: "{{ etc_k8s.stat.exists }}"
    k8s_healthy: true

- block: # set k8s_healthy to false if not is installed but not livez
  - name: check if k8s operation possible
    debug: 
      msg: "k8s operation not possible, cluster is not stable"

  - name: set unhealthy
    set_fact: 
      k8s_healthy: false
  when: k8s_installed and livez.rc != 0

- name: set k8s_exists
  set_fact: 
    k8s_init_done: "{{ groups.all | map('extract',hostvars,'k8s_installed') | or_array }}"

- name: set healthy_node to a control_plane node
  set_fact:
    healthy_node: "{{ candis | first }}"
  vars:
    candis: "{{ groups.all | map('extract', hostvars) 
                | selectattr('k8s_installed', 'defined')
                | selectattr('k8s_installed', 'eq', True)
                | selectattr('system_roles', 'defined')
                | selectattr('system_roles', 'contains', 'control_plane')
                | selectattr('k8s_healthy', 'defined')
                | selectattr('k8s_healthy', 'eq', True)
                | map(attribute='ansible_facts', default={}) 
                | map(attribute='fqdn', default=omit)
                | select('defined')
                | list | shuffle }}"
  run_once: true
  when: candis | default([]) | length > 0

- name: check result
  debug:
    msg: "livez:{{ livez.rc }} k8s_installed:{{k8s_installed}} k8s_healthy: {{ k8s_healthy }} k8s_init_done:{{ k8s_init_done }} current_k8s_version:{{current_k8s_version}} k8s_upgrade:{{k8s_upgrade}} healthy node: {{healthy_node|default('none') }}"
