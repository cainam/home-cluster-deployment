namespace: {{ kustom.namespace }}

resources:
- CronJob.yaml
- RoleBinding.yaml
- Role.yaml
- ServiceAccount.yaml

configMapGenerator:
- name: {{ kustom.name }}
  literals: []
- name: {{ kustom.name }}-certs
  literals:
  - service-ca-bundle.crt={{ bundled_ca_content | quote }}

generatorOptions:
  disableNameSuffixHash: true
