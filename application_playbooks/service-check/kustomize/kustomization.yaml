namespace: {{ kustom.namespace }}

resources:
- CronJob.yaml
- RoleBinding.yaml
- Role.yaml
- ServiceAccount.yaml

configMapGenerator:
- name: {{ kustom.name }}
  literals: []
- name: {{ kustom.name }}-certs
  files:
{% for file in local_ca_files %}
      - {{ file }}
{% endfor %}

generatorOptions:
  disableNameSuffixHash: true
