---
#
# dependency: []
driver:
  name: podman
  options:
    managed: true
platforms:
  - name: instance
    image: myregistry.adm13:443/local/molecule-tester:20260305
    pre_build_image: true
    security_opts:
      - seccomp=unconfined
provisioner:
  name: ansible
  env:
    ANSIBLE_ASYNC_DIR: /tmp/.ansible_async
    ANSIBLE_REMOTE_TMP: /tmp/.ansible/tmp
    ANSIBLE_COLLECTIONS_PATH: /usr/share/ansible/collections
  config_options:
    defaults:
      fact_caching: jsonfile
      fact_caching_connection: /tmp/ansible_cache
      gather_facts: True
dependency:
  name: galaxy
  enabled: False
