---
dependency:
  name: galaxy
  enabled: false

driver:
  name: podman
  options:
    managed: true

platforms:
  - name: instance
    image: myregistry.adm13:443/local/molecule-tester:20260416
    etc_hosts:
      "molecule-instance": "127.0.0.1"
    pre_build_image: true
    network: host
    security_opts:
      - seccomp=unconfined

provisioner:
  name: ansible
  env:
    # Use the native 'default' callback but tell it to act like the YAML plugin
    #ANSIBLE_STDOUT_CALLBACK: default
    #ANSIBLE_CALLBACK_ENABLED: simple_junit
    #ANSIBLE_RESULT_FORMAT: yaml
    #ANSIBLE_CALLBACK_PLUGINS: "/tmp/home/home-cluster-deployment/callback_plugins"

    #JUNIT_OUTPUT_DIR: /tmp/molecule

    # Path configuration
    #ANSIBLE_REMOTE_TMP: /tmp/ansible
    #ANSIBLE_ASYNC_DIR: /tmp/.ansible_async
  config_options:
    defaults:
      fact_caching: jsonfile
      fact_caching_connection: /tmp/ansible_cache
      gather_facts: true
      # Ensures the engine knows to load the junit plugin
      callbacks_enabled: junit

verifier:
  name: ansible
